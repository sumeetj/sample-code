<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP API Demo</title>
    <style>
        body{font-family:system-ui,max-width:700px;margin:2rem auto;padding:1rem;line-height:1.5}
        button{background:#007cba;color:white;border:0;padding:.75rem 1.5rem;border-radius:4px;cursor:pointer;font-size:1rem;margin:.25rem}
        button:hover{background:#005a87}
        pre{background:#f4f4f4;padding:1rem;border-radius:4px;overflow:auto;white-space:pre-wrap;font-size:.9rem}
        .status{margin:1rem 0;padding:.5rem;border-radius:4px}
        .success{background:#d4edda;color:#155724}
        .error{background:#f8d7da;color:#721c24}
        h1{font-size:1.75rem}
    </style>
</head>
<body>
    <h1>🛠️ PHP REST API Demo</h1>
    <p>Test the custom endpoint live. Fetches normalized content JSON.</p>
    
    <button onclick="fetchData('articles',3)">📄 Articles (3)</button>
    <button onclick="fetchData('news',2)">📰 News (2)</button>
    <button onclick="fetchInvalid()">❌ Error Test</button>
    
    <div id="status"></div>
    <pre id="output">Click button to test API →</pre>

    <script>
    async function fetchData(type, perPage=5){
        document.getElementById('status').innerHTML='<div class="status">Loading...</div>';
        try{
            // FIXED: Exact path to api.php
            const url=`./api.php/content/${type}?per_page=${perPage}`;
            const res=await fetch(url);
            const data=await res.json();
            document.getElementById('output').textContent=JSON.stringify(data,null,2);
            document.getElementById('status').innerHTML=`<div class="status success">✅ ${data.length||0} items from ${type}</div>`;
        }catch(e){
            document.getElementById('output').textContent=JSON.stringify({error:e.message},null,2);
            document.getElementById('status').innerHTML=`<div class="status error">❌ ${e.message}</div>`;
        }
    }
    async function fetchInvalid(){await fetchData('invalid!!!')}
    </script>
</body>
</html>
